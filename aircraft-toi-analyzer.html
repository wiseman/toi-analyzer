<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aircraft TOI Analyzer</title>

    <!-- MapLibre GL -->
    <link href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 0;
        }

        .container {
            background: white;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 20px;
        }

        .header h1 {
            font-size: 1.6em;
            margin-bottom: 6px;
        }

        .header p {
            opacity: .9;
            font-size: .95em;
        }

        .content {
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .layout {
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 16px;
            height: 100%;
            min-height: 0;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow: hidden;
            min-height: 0;
        }

        .main {
            height: 100%;
            overflow: hidden;
            min-height: 0;
            position: relative;
        }

        .drop-zone {
            border: 2px dashed #667eea;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            background: #f8f9ff;
            transition: .2s ease;
            cursor: pointer;
        }

        .drop-zone:hover {
            background: #e8ebff;
            border-color: #764ba2;
        }

        .drop-zone.dragover {
            background: #d8dcff;
            border-color: #764ba2;
            transform: scale(1.02);
        }

        .drop-zone svg {
            width: 40px;
            height: 40px;
            margin-bottom: 10px;
            fill: #667eea;
        }

        .drop-zone h3 {
            color: #333;
            margin-bottom: 4px;
            font-size: 1em;
        }

        .drop-zone p {
            color: #666;
        }

        input[type="file"] {
            display: none;
        }

        #map {
            height: 100%;
            border-radius: 10px;
            display: none;
        }

        .results {
            display: none;
            flex: 1;
            min-height: 0;
        }

        .results h2 {
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .results h2 svg {
            width: 24px;
            height: 24px;
            fill: #667eea;
        }

        .toi-list {
            display: grid;
            gap: 15px;
            overflow: auto;
        }

        .toi-item {
            background: #f8f9ff;
            border: 1px solid #e1e5ff;
            border-radius: 10px;
            padding: 20px;
            transition: .3s ease;
        }

        .toi-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
        }

        .toi-item:hover {
            box-shadow: 0 5px 20px rgba(102, 126, 234, .2);
            transform: translateY(-2px);
        }

        .toi-number {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2em;
        }

        .toi-details {
            display: grid;
            gap: 8px;
        }

        .toi-coords {
            font-family: Monaco, "Courier New", monospace;
            color: #333;
            font-size: 0.85em;
            font-weight: 600;
        }

        .toi-stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .stat {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .stat-label {
            color: #666;
            font-size: .85em;
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .stat-value {
            color: #333;
            font-weight: 600;
        }

        .toi-sessions {
            margin-top: 10px;
        }
        
        .sessions-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85em;
            color: #555;
        }
        
        .sessions-table th {
            background: #e8ebff;
            color: #333;
            font-weight: 600;
            padding: 6px 8px;
            text-align: left;
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .sessions-table td {
            padding: 4px 8px;
            border-bottom: 1px solid #f0f0f0;
            font-family: Monaco, "Courier New", monospace;
        }
        
        .sessions-table tr:hover {
            background: #f8f9ff;
        }

        .quality-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 5px;
            font-size: .85em;
            font-weight: 600;
            text-transform: uppercase;
        }

        .quality-high {
            background: #d4f4dd;
            color: #1e7e34;
        }

        .quality-medium {
            background: #fff3cd;
            color: #856404;
        }

        .quality-low {
            background: #f8d7da;
            color: #721c24;
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .loading svg {
            width: 60px;
            height: 60px;
            animation: rotate 2s linear infinite;
        }

        @keyframes rotate {
            100% {
                transform: rotate(360deg);
            }
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        body.initial .content {
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body.initial .layout {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        body.initial .sidebar {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body.initial .main {
            display: none;
        }

        body.initial .drop-zone {
            border-width: 3px;
            padding: 48px;
            max-width: 720px;
            width: min(90vw, 800px);
            min-height: 260px;
        }

        body.initial .drop-zone svg {
            width: 64px;
            height: 64px;
            margin-bottom: 14px;
        }

        body.initial .drop-zone h3 {
            font-size: 1.4em;
            margin-bottom: 8px;
        }

        body.initial .drop-zone p {
            font-size: 1em;
        }

        /* Base layer toggle control */
        .basemap-control {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 5;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .15);
            padding: 8px 10px;
            font-size: .9em;
            display: none;
            /* shown after map init */
        }

        .basemap-control label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            margin: 4px 0;
        }
    </style>
</head>

<body class="initial">
    <div class="container">
        <div class="header">
            <h1>🛩️ Aircraft TOI Analyzer</h1>
            <p>Detect circling patterns and identify targets of interest from KML flight data</p>
        </div>

        <div class="content">
            <div class="layout">
                <div class="sidebar">
                    <div class="drop-zone" id="dropZone">
                        <svg viewBox="0 0 24 24">
                            <path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z" />
                        </svg>
                        <h3>Drop KML File Here</h3>
                        <p>or click to browse</p>
                        <input type="file" id="fileInput" accept=".kml" />
                    </div>

                    <div class="results" id="results">
                        <h2>
                            <svg viewBox="0 0 24 24">
                                <path
                                    d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" />
                            </svg>
                            Targets of Interest
                        </h2>
                        <div class="toi-list" id="toiList"></div>
                    </div>

                    <div class="error" id="error"></div>
                </div>

                <div class="main">
                    <!-- Base layer control (OSM vs ESRI) -->
                    <div class="basemap-control" id="basemapControl" role="group" aria-label="Base map">
                        <div><strong>Base map</strong></div>
                        <label><input type="radio" name="basemap" value="osm" checked> OpenStreetMap</label>
                        <label><input type="radio" name="basemap" value="esri"> Esri World Imagery</label>
                    </div>

                    <div class="loading" id="loading">
                        <svg viewBox="0 0 24 24" fill="#667eea">
                            <path
                                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z" />
                            <path d="M12 6v6l4 2" opacity="0.3" />
                        </svg>
                        <p>Analyzing flight patterns...</p>
                    </div>

                    <div id="map"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { parseKML, analyzeCirclesMulti, circlePolygon, computeOnStationArcs, computeOnStationFlightSegments } from './kmlCircleAnalyzer.js';
        let map = null;
        let detectedCircles = [];
        let focusLayers = []; // will hold ids of highlight layers if needed
        let lastCoords = [];
        let sourcesAdded = false;

        // Maintain feature collections for dynamic updates
        const geo = {
            flight: { type: 'FeatureCollection', features: [] },
            toiCenters: { type: 'FeatureCollection', features: [] },
            toiCircles: { type: 'FeatureCollection', features: [] }, // polygon rings (radius in meters)
            toiOnStationArcs: { type: 'FeatureCollection', features: [] },
            flightOnStation: { type: 'FeatureCollection', features: [] },
            sessionArcHighlight: { type: 'FeatureCollection', features: [] },
            sessionFlightHighlight: { type: 'FeatureCollection', features: [] }
        };

        // Ensure map resizes with layout/window
        window.addEventListener('resize', () => {
            if (map) map.resize();
        });

        function exitInitialState() {
            document.body.classList.remove('initial');
        }

        // Drag & drop
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) processFile(files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) processFile(e.target.files[0]);
        });

        function processFile(file) {
            if (!file.name.toLowerCase().endsWith('.kml')) {
                showError('Please upload a KML file');
                return;
            }
            exitInitialState();
            const reader = new FileReader();
            reader.onload = (e) => {
                try { analyzeKML(e.target.result); }
                catch (err) { showError('Error processing KML file: ' + err.message); }
            };
            reader.readAsText(file);
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => { errorDiv.style.display = 'none'; }, 5000);
        }

        // --- KML parsing & analytics are now imported from kmlCircleAnalyzer.js ---

        // --- MapLibre helpers ---
        function initMap(centerLon, centerLat) {
            if (map) return;

            const mapDiv = document.getElementById('map');
            mapDiv.style.display = 'block';

            map = new maplibregl.Map({
                container: 'map',
                center: [centerLon, centerLat],
                zoom: 13,
                style: {
                    version: 8,
                    sources: {
                        osm: {
                            type: 'raster',
                            tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
                            tileSize: 256,
                            attribution: '© OpenStreetMap contributors'
                        },
                        esri: {
                            type: 'raster',
                            tiles: ['https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
                            tileSize: 256,
                            attribution: 'Source: Esri — Esri, Maxar, Earthstar Geographics, and the GIS User Community'
                        }
                    },
                    layers: [
                        { id: 'osm-tiles', type: 'raster', source: 'osm', minzoom: 0, maxzoom: 19, layout: { visibility: 'visible' } },
                        { id: 'esri-tiles', type: 'raster', source: 'esri', minzoom: 0, maxzoom: 19, layout: { visibility: 'none' } }
                    ]
                },
                attributionControl: true
            });

            map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), 'top-right');

            map.on('load', () => {
                // Show base layer switcher
                document.getElementById('basemapControl').style.display = 'block';

                // Dynamic sources/layers for data
                addDataSourcesAndLayers();
            });

            // Base map toggle
            document.querySelectorAll('input[name="basemap"]').forEach(radio => {
                radio.addEventListener('change', () => {
                    const val = document.querySelector('input[name="basemap"]:checked').value;
                    map.setLayoutProperty('osm-tiles', 'visibility', val === 'osm' ? 'visible' : 'none');
                    map.setLayoutProperty('esri-tiles', 'visibility', val === 'esri' ? 'visible' : 'none');
                });
            });

            // Defer resize to next tick
            setTimeout(() => map.resize(), 0);
        }

        function addDataSourcesAndLayers() {
            if (sourcesAdded) return;
            sourcesAdded = true;

            map.addSource('flight', { type: 'geojson', data: geo.flight });
            map.addSource('toi-centers', { type: 'geojson', data: geo.toiCenters });
            map.addSource('toi-circles', { type: 'geojson', data: geo.toiCircles });
            map.addSource('toi-onstation', { type: 'geojson', data: geo.toiOnStationArcs });
            map.addSource('flight-onstation', { type: 'geojson', data: geo.flightOnStation });
            map.addSource('session-arc-hl', { type: 'geojson', data: geo.sessionArcHighlight });
            map.addSource('session-flight-hl', { type: 'geojson', data: geo.sessionFlightHighlight });

            // Flight path
            map.addLayer({
                id: 'flight-line',
                type: 'line',
                source: 'flight',
                paint: { 'line-color': '#667eea', 'line-width': 2, 'line-opacity': 0.6 }
            });

            // On-station portions of the original flight path
            map.addLayer({
                id: 'flight-onstation',
                type: 'line',
                source: 'flight-onstation',
                paint: { 'line-color': '#28a745', 'line-width': 3, 'line-opacity': 0.95 }
            });

            // Circle polygons (outline + fill)
            map.addLayer({
                id: 'toi-circles-fill',
                type: 'fill',
                source: 'toi-circles',
                paint: { 'fill-color': '#667eea', 'fill-opacity': 0.08 }
            });
            map.addLayer({
                id: 'toi-circles-outline',
                type: 'line',
                source: 'toi-circles',
                paint: { 'line-color': '#667eea', 'line-width': 1, 'line-opacity': 0.3 }
            });

            // On-station arc segments along circle circumference
            map.addLayer({
                id: 'toi-onstation-arcs',
                type: 'line',
                source: 'toi-onstation',
                paint: {
                    'line-color': '#28a745',
                    'line-width': 3,
                    'line-opacity': 0.9
                }
            });

            // Center points (styled as circles via "circle" layer)
            map.addLayer({
                id: 'toi-centers-circles',
                type: 'circle',
                source: 'toi-centers',
                paint: {
                    'circle-radius': 6,
                    'circle-stroke-color': '#ffffff',
                    'circle-stroke-width': 2,
                    'circle-color': [
                        'match',
                        ['get', 'quality'],
                        'high', '#28a745',
                        'medium', '#ffc107',
            /* else */ '#dc3545'
                    ],
                    'circle-opacity': 0.9
                }
            });

            // Session highlight layers (drawn on top)
            map.addLayer({
                id: 'session-flight-hl',
                type: 'line',
                source: 'session-flight-hl',
                paint: { 'line-color': '#ff9800', 'line-width': 6, 'line-opacity': 0.95 }
            });
            map.addLayer({
                id: 'session-arc-hl',
                type: 'line',
                source: 'session-arc-hl',
                paint: { 'line-color': '#ff5722', 'line-width': 6, 'line-opacity': 0.95 }
            });

            // Interactivity: popup on click
            map.on('click', 'toi-centers-circles', (e) => {
                const f = e.features[0];
                const p = f.properties;
                const html = `
          <strong>${p.title || 'TOI'}</strong><br>
          Lat: ${Number(p.lat).toFixed(6)}<br>
          Lon: ${Number(p.lon).toFixed(6)}<br>
          Radius: ${Number(p.radius).toFixed(0)}m<br>
          Quality: ${p.quality}<br>
          Orbits: ${Number(p.orbits || 0).toFixed(1)}<br>
          Overall Start: ${formatTimestamp(Number(p.startMs))}<br>
          Overall End: ${formatTimestamp(Number(p.endMs))}<br>
          Total On-Station: ${formatDuration(Number(p.totalOnStationMs))}<br>
          Sessions:<br>
          ${Array.isArray(p.sessions) && p.sessions.length > 0 ? p.sessions.map((s, i) => `${i + 1}) ${formatTimestamp(Number(s.startMs))} — ${formatTimestamp(Number(s.endMs))} (${formatDuration(Number(s.durationMs))})`).join('<br>') : '—'}
        `;
                new maplibregl.Popup({ offset: 10 })
                    .setLngLat([Number(p.lon), Number(p.lat)])
                    .setHTML(html)
                    .addTo(map);
            });

            // Cursor feedback
            map.on('mouseenter', 'toi-centers-circles', () => map.getCanvas().style.cursor = 'pointer');
            map.on('mouseleave', 'toi-centers-circles', () => map.getCanvas().style.cursor = '');
        }

        function updateDataOnMap() {
            if (!map || !map.isStyleLoaded()) return;
            (map.getSource('flight')).setData(geo.flight);
            (map.getSource('toi-centers')).setData(geo.toiCenters);
            (map.getSource('toi-circles')).setData(geo.toiCircles);
            (map.getSource('toi-onstation')).setData(geo.toiOnStationArcs);
            (map.getSource('flight-onstation')).setData(geo.flightOnStation);
            if (map.getSource('session-arc-hl')) (map.getSource('session-arc-hl')).setData(geo.sessionArcHighlight);
            if (map.getSource('session-flight-hl')) (map.getSource('session-flight-hl')).setData(geo.sessionFlightHighlight);
        }

        // circlePolygon, bearingToCoordinate, and angleDiff are imported

        function highlightSession(toiIndex, sessionIndex) {
            if (!map || !detectedCircles[toiIndex] || !Array.isArray(detectedCircles[toiIndex].sessions)) return;
            const circle = detectedCircles[toiIndex];
            const session = circle.sessions[sessionIndex];
            if (!session) return;

            const sMs = session.startMs;
            const eMs = session.endMs;

            // Filter arc features for this TOI and within session time
            const arcFeatures = (geo.toiOnStationArcs.features || []).filter(f =>
                f.properties && f.properties.toiId === toiIndex &&
                Number.isFinite(f.properties.startMs) && Number.isFinite(f.properties.endMs) &&
                f.properties.startMs <= eMs && f.properties.endMs >= sMs
            );

            // Filter flight on-station segments for this TOI within session
            const flightFeatures = (geo.flightOnStation.features || []).filter(f =>
                f.properties && f.properties.toiId === toiIndex &&
                Number.isFinite(f.properties.startMs) && Number.isFinite(f.properties.endMs) &&
                f.properties.startMs <= eMs && f.properties.endMs >= sMs
            );

            geo.sessionArcHighlight = { type: 'FeatureCollection', features: arcFeatures };
            geo.sessionFlightHighlight = { type: 'FeatureCollection', features: flightFeatures };

            if (map.getSource('session-arc-hl')) (map.getSource('session-arc-hl')).setData(geo.sessionArcHighlight);
            if (map.getSource('session-flight-hl')) (map.getSource('session-flight-hl')).setData(geo.sessionFlightHighlight);
        }

        function clearSessionHighlight() {
            geo.sessionArcHighlight = { type: 'FeatureCollection', features: [] };
            geo.sessionFlightHighlight = { type: 'FeatureCollection', features: [] };
            if (map && map.isStyleLoaded()) {
                if (map.getSource('session-arc-hl')) (map.getSource('session-arc-hl')).setData(geo.sessionArcHighlight);
                if (map.getSource('session-flight-hl')) (map.getSource('session-flight-hl')).setData(geo.sessionFlightHighlight);
            }
        }

        // computeOnStationSessions/Arcs/FlightSegments are imported

        function computeBoundsFromLineString(lineCoords) {
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            for (const [x, y] of lineCoords) {
                if (x < minX) minX = x;
                if (y < minY) minY = y;
                if (x > maxX) maxX = x;
                if (y > maxY) maxY = y;
            }
            return [[minX, minY], [maxX, maxY]];
        }

        function focusOnTOI(index) {
            if (!map || !detectedCircles[index]) return;
            const c = detectedCircles[index];
            // Compute zoom that fits diameter nicely
            const size = map.getContainer().getBoundingClientRect();
            const paddingRatio = 0.6;
            const pixelSpan = Math.min(size.width, size.height) * paddingRatio;
            const diameterMeters = c.radius * 2;
            const latRad = c.center.lat * Math.PI / 180;
            const initialRes = 156543.03392804097; // m/px at zoom 0 (equator)
            let zoom = Math.log2((initialRes * Math.cos(latRad)) / (diameterMeters / pixelSpan));
            zoom = Math.max(map.getMinZoom(), Math.min(map.getMaxZoom() ?? 22, zoom));
            map.flyTo({ center: [c.center.lon, c.center.lat], zoom });
        }

        function formatTimestamp(ms) {
            if (!Number.isFinite(ms)) return '—';
            try { return new Date(ms).toLocaleString(); } catch { return '—'; }
        }

        function formatTime24Hour(ms) {
            if (!Number.isFinite(ms)) return '—';
            try { 
                return new Date(ms).toLocaleTimeString('en-GB', { 
                    hour: '2-digit', 
                    minute: '2-digit', 
                    second: '2-digit' 
                });
            } catch { return '—'; }
        }

        function formatDuration(ms) {
            if (!Number.isFinite(ms)) return '—';
            const totalSec = Math.max(0, Math.round(ms / 1000));
            const days = Math.floor(totalSec / 86400);
            const hours = Math.floor((totalSec % 86400) / 3600);
            const minutes = Math.floor((totalSec % 3600) / 60);
            const seconds = totalSec % 60;
            return `${days.toString().padStart(2, '0')}:${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function displayResults(circles) {
            const resultsDiv = document.getElementById('results');
            const toiList = document.getElementById('toiList');

            if (circles.length === 0) {
                toiList.innerHTML = '<p style="text-align:center;color:#666;">No circling patterns detected</p>';
                resultsDiv.style.display = 'flex';
                resultsDiv.style.flexDirection = 'column';
                return;
            }

            toiList.innerHTML = circles.map((circle, idx) => `
        <div class="toi-item" data-toi-index="${idx}">
          <div class="toi-header">
            <div class="toi-number">${idx + 1}</div>
            <div class="toi-coords">
              ${circle.center.lat.toFixed(6)}, ${circle.center.lon.toFixed(6)}
            </div>
          </div>
          <div class="toi-stats">
            <div class="stat"><span class="stat-label">Radius</span><span class="stat-value">${circle.radius.toFixed(0)}m</span></div>
            <div class="stat"><span class="stat-label">Std Dev</span><span class="stat-value">${(circle.stdDev ? circle.stdDev : Math.sqrt(circle.variance)).toFixed(1)}m</span></div>
            <div class="stat"><span class="stat-label">Orbits</span><span class="stat-value">${(circle.orbits || 0).toFixed(1)}</span></div>
            <div class="stat"><span class="stat-label">Quality</span><span class="quality-badge quality-${circle.quality}">${circle.quality === 'high' ? 'HIGH' : circle.quality === 'medium' ? 'MED' : 'LOW'}</span></div>
            <div class="stat"><span class="stat-label">Sessions</span><span class="stat-value">${Array.isArray(circle.sessions) ? circle.sessions.length : 0}</span></div>
            <div class="stat"><span class="stat-label">On-Station</span><span class="stat-value">${formatDuration(circle.totalOnStationMs)}</span></div>
          </div>
          <div class="toi-sessions">
            ${Array.isArray(circle.sessions) && circle.sessions.length > 0
              ? `<table class="sessions-table">
                  <thead>
                    <tr>
                      <th>Start</th>
                      <th>End</th>
                      <th>Duration</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${circle.sessions.map((s, i) => 
                      `<tr data-session-index="${i}">
                        <td>${formatTime24Hour(s.startMs)}</td>
                        <td>${formatTime24Hour(s.endMs)}</td>
                        <td>${formatDuration(s.durationMs)}</td>
                      </tr>`
                    ).join('')}
                  </tbody>
                </table>`
              : ''}
          </div>
        </div>
      `).join('');

            resultsDiv.style.display = 'flex';
            resultsDiv.style.flexDirection = 'column';

            Array.from(document.querySelectorAll('.toi-item')).forEach(el => {
                el.addEventListener('click', () => {
                    const idx = parseInt(el.getAttribute('data-toi-index'), 10);
                    focusOnTOI(idx);
                });
                el.style.cursor = 'pointer';

                // Add hover handlers for session table rows
                el.querySelectorAll('tr[data-session-index]').forEach(sessEl => {
                    const toiIdx = parseInt(el.getAttribute('data-toi-index'), 10);
                    const sessIdx = parseInt(sessEl.getAttribute('data-session-index'), 10);
                    sessEl.addEventListener('mouseenter', () => highlightSession(toiIdx, sessIdx));
                    sessEl.addEventListener('mouseleave', () => clearSessionHighlight());
                });
            });
        }

        function analyzeKML(kmlText) {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').style.display = 'none';

            setTimeout(() => {
                try {
                    const coords = parseKML(kmlText);
                    lastCoords = coords;
                    if (coords.length < 50) throw new Error('Insufficient data points in KML file');

                    const circles = analyzeCirclesMulti(coords);
                    detectedCircles = circles;

                    // Init map at mean center
                    const centerLat = coords.reduce((s, p) => s + p.lat, 0) / coords.length;
                    const centerLon = coords.reduce((s, p) => s + p.lon, 0) / coords.length;
                    initMap(centerLon, centerLat);

                    // Build GeoJSONs
                    geo.flight = {
                        type: 'FeatureCollection',
                        features: [{
                            type: 'Feature',
                            properties: {},
                            geometry: { type: 'LineString', coordinates: coords.map(c => [c.lon, c.lat]) }
                        }]
                    };

                    geo.toiCenters = {
                        type: 'FeatureCollection',
                        features: circles.map((c, i) => ({
                            type: 'Feature',
                            properties: {
                                id: i,
                                title: `TOI ${i + 1}`,
                                lat: c.center.lat,
                                lon: c.center.lon,
                                radius: c.radius,
                                quality: c.quality,
                                orbits: c.orbits || 0,
                                startMs: c.startMs,
                                endMs: c.endMs,
                                durationMs: c.durationMs,
                                sessions: c.sessions || [],
                                totalOnStationMs: c.totalOnStationMs || 0
                            },
                            geometry: { type: 'Point', coordinates: [c.center.lon, c.center.lat] }
                        }))
                    };

                    geo.toiCircles = {
                        type: 'FeatureCollection',
                        features: circles.map(c => circlePolygon(c.center, c.radius))
                    };

                    // Compute on-station arc segments for each circle
                    geo.toiOnStationArcs = computeOnStationArcs(coords, circles);

                    // Compute on-station segments along the original flight path
                    geo.flightOnStation = computeOnStationFlightSegments(coords, circles);

                    updateDataOnMap();

                    // Fit to flight bounds
                    if (coords.length > 0) {
                        const bounds = computeBoundsFromLineString(coords.map(c => [c.lon, c.lat]));
                        map.fitBounds(bounds, { padding: 50, duration: 800 });
                    }

                    displayResults(circles);
                    // after results render, attach hover listeners are already wired in displayResults
                } catch (err) {
                    showError('Error analyzing KML: ' + err.message);
                } finally {
                    document.getElementById('loading').style.display = 'none';
                }
            }, 100);
        }
    </script>
</body>
